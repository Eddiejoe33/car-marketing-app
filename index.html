<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Car Marketing App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html,body{
  height:100%;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

.app{
  height:100%;
  display:flex;
  flex-direction:column;
}

.page-container{
  flex:1;
  position:relative;
}

.page{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:60px;
  overflow:auto;
}

.page.active{
  display:flex;
  flex-direction:column;
}

.header{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:15px;
}

.file-box{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  font-size:15px;
}

.output{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  font-size:14px;
  flex:1;
  overflow:auto;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #1f2937;
  z-index:1000;
}

.nav-item{
  flex:1;
  text-align:center;
  color:#9ca3af;
  font-size:14px;
  padding-top:6px;
  transition:0.3s;
}

.nav-item.active{
  color:#2563eb;
  font-weight:bold;
  border-top:3px solid #2563eb;
}

/* ============ HISTORY FIX ============ */
.history-post {
  background:#1e293b;
  padding:8px;
  border-radius:8px;
  margin-bottom:12px;
  display:flex;
  flex-direction:column;
}

.history-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.history-delete-btn {
  width:auto;
  padding:4px 8px;
  font-size:12px;
  background:red;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.history-images img {
  width:100%;
  border-radius:6px;
  margin-top:6px;
}
</style>
</head>

<body>
<div class="app">

  <div class="page-container">

    <!-- DASHBOARD -->
    <div class="page active" id="dashboard">
      <div>
        <div class="header">🚗 Create Car Advert</div>

        <input type="text" id="carName" placeholder="Car Name">
        <input type="text" id="year" placeholder="Year">
        <input type="text" id="price" placeholder="Price">
        <select id="condition">
          <option>Condition</option>
          <option>Brand New</option>
          <option>Foreign Used</option>
          <option>Nigerian Used</option>
        </select>

        <div class="file-box">
          📸 Upload Images
          <input type="file" id="mediaInput" multiple accept="image/*">
        </div>

        <button onclick="generatePost()">✨ Generate Post</button>
        <button onclick="sharePost()">📤 Share Post</button>
      </div>

      <div class="output" id="result">
        Your generated advert will appear here...
      </div>
    </div>

    <!-- HISTORY -->
    <div class="page" id="history">
      <div class="header">🕘 History</div>
      <div class="output" id="historyBox">No posts yet.</div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="settings">
      <div class="header">⚙ Settings</div>
      <input type="text" id="dealerName" placeholder="Change Dealer Name">
      <input type="password" id="dealerPin" placeholder="Change PIN">
      <button onclick="saveSettings()">Save Settings</button>
    </div>

    <!-- PROFILE -->
    <div class="page" id="profile">
      <div class="header">👤 Profile</div>
      <div class="output" id="profileInfo"></div>
    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('dashboard', this)">🏠 Dashboard</div>
    <div class="nav-item" onclick="switchPage('history', this)">🕘 History</div>
    <div class="nav-item" onclick="switchPage('settings', this)">⚙ Settings</div>
    <div class="nav-item" onclick="switchPage('profile', this)">👤 Profile</div>
  </div>

</div>

<script>
let db;

let request = indexedDB.open("CarMarketingDB", 1);
request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("cars",{ keyPath:"id", autoIncrement:true });
};
request.onsuccess = e => {
  db = e.target.result;
  loadHistory();
  loadProfile();
};
request.onerror = () => alert("Database failed to open");

function switchPage(pageId, element){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  element.classList.add('active');
}

function saveSettings(){
  let name=document.getElementById("dealerName").value;
  let pin=document.getElementById("dealerPin").value;
  if(!name||!pin){ alert("Please fill all fields"); return; }
  localStorage.setItem("dealerName", name);
  localStorage.setItem("dealerPin", pin);
  alert("Settings saved successfully!");
  loadProfile();
}

function loadProfile(){
  let name=localStorage.getItem("dealerName")||"Eddie Motors";
  let status="Active";
  let profileBox=document.getElementById("profileInfo");
  if(profileBox) profileBox.innerHTML=`Dealer: ${name}<br><br>Status: ${status}`;
}

function saveToHistory(postText, files){
  let transaction=db.transaction(["cars"],"readwrite");
  let store=transaction.objectStore("cars");
  let arr=files?Array.from(files):[];
  store.add({text:postText, images:arr, date:new Date().toLocaleString()});
  transaction.oncomplete=()=>loadHistory();
}

function loadHistory(){
  if(!db) return;
  let historyBox=document.getElementById("historyBox");
  if(!historyBox) return;
  historyBox.innerHTML="";
  let transaction=db.transaction(["cars"],"readonly");
  let store=transaction.objectStore("cars");
  let request=store.getAll();
  request.onsuccess=function(){
    let history=request.result;
    if(history.length===0){ historyBox.innerHTML="No posts yet."; return; }
    history.reverse().forEach(item=>{
      let imagesHTML="";
      if(item.images && item.images.length>0)
        item.images.forEach(img=>imagesHTML+=`<img src="${URL.createObjectURL(img)}">`);
      historyBox.innerHTML+=`
        <div class="history-post">
          <div class="history-header">
            <small style="color:#9ca3af;">${item.date}</small>
            <button class="history-delete-btn" onclick="deleteCar(${item.id})">Delete</button>
          </div>
          <div class="history-images">${imagesHTML}</div>
          <div style="margin-top:6px;">${item.text}</div>
        </div>`;
    });
  };
}

function deleteCar(id){
  let transaction=db.transaction(["cars"],"readwrite");
  let store=transaction.objectStore("cars");
  store.delete(id);
  transaction.oncomplete=()=>loadHistory();
}

const captions=[
  "🔥 Clean and affordable ride!",
  "💎 Premium condition, ready to drive!",
  "🚘 Smooth engine, zero worries!",
  "⚡ Fast deal — serious buyers only!",
  "💰 Best price in the market!",
  "📍 Available for inspection today!",
  "🔑 Drive home today!",
  "🚗 Very neat and fuel efficient!"
];

function generatePost(){
  let dealerName=localStorage.getItem("dealerName")||"Eddie Motors";
  let name=document.getElementById("carName").value;
  let year=document.getElementById("year").value;
  let price=document.getElementById("price").value;
  let condition=document.getElementById("condition").value;
  let files=document.getElementById("mediaInput").files;
  let post=`🚗 ${name} (${year})
💰 Price: ${price}
📌 Condition: ${condition}

🏢 Dealer: ${dealerName}

${captions[Math.floor(Math.random()*captions.length)]}
📲 DM now to secure this deal!`;
  document.getElementById("result").innerText=post;
  saveToHistory(post, files);
}

async function sharePost(){
  const text=document.getElementById("result").innerText;
  const files=Array.from(document.getElementById("mediaInput").files);
  if(navigator.canShare && navigator.canShare({files})){
    await navigator.share({title:"Car Advert",text,files});
  }else{ alert("Sharing not supported on this browser."); }
}
</script>
</body>
  </html>
