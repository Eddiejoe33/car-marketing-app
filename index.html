<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Dealer Car Marketing App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
html,body{height:100%;background:#0f172a;color:white;}
.page{display:none;padding:15px;padding-bottom:100px;min-height:100vh;overflow-y:auto;}
.page.active{display:block;}
.header{text-align:center;font-size:22px;font-weight:bold;margin-bottom:15px;}
input,select{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;background:#1e293b;color:white;font-size:15px;}
.file-box{background:#1e293b;padding:10px;border-radius:8px;margin-bottom:10px;}
button{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:bold;font-size:15px;cursor:pointer;}
.output{background:#1e293b;padding:10px;border-radius:8px;font-size:14px;white-space:pre-line;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#111827;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #1f2937;}
.nav-item{flex:1;text-align:center;color:#9ca3af;font-size:14px;padding-top:6px;transition:0.3s;}
.nav-item.active{color:#2563eb;font-weight:bold;border-top:3px solid #2563eb;}
.nav-item span{display:block;font-size:12px;margin-top:2px;}
.featured{border:2px solid gold;}
</style>
</head>
<body>

<!-- DASHBOARD -->
<div class="page active" id="dashboard">
  <div class="header">🚗 Dealer Car App</div>

  <input type="text" id="carName" placeholder="Car Name">
  <input type="text" id="year" placeholder="Year">
  <input type="text" id="price" placeholder="Price">
  <input type="text" id="dealerPhone" placeholder="Dealer WhatsApp Number (234XXXXXXXXXX)">

  <select id="condition">
    <option>Condition</option>
    <option>Brand New</option>
    <option>Foreign Used</option>
    <option>Nigerian Used</option>
  </select>

  <div class="file-box">
    📸 Upload Images
    <input type="file" id="mediaInput" multiple accept="image/*">
  </div>

  <button onclick="generatePost()">✨ Generate Post</button>
  <button onclick="sharePost()">📤 Share Post</button>

  <div class="output" id="result">Your generated advert will appear here...</div>
</div>

<!-- HISTORY -->
<div class="page" id="history">
  <div class="header">🕘 History & Featured</div>
  <div class="output" id="historyList"></div>
</div>

<!-- SETTINGS -->
<div class="page" id="settings">
  <div class="header">⚙ Settings</div>
  <input type="text" id="dealerName" placeholder="Dealer Name">
  <input type="text" id="dealerPhoneSetting" placeholder="Dealer WhatsApp Number (234XXXXXXXXXX)">
  <input type="password" id="dealerPin" placeholder="Change PIN">
  <button onclick="saveSettings()">Save Settings</button>
</div>

<!-- PROFILE -->
<div class="page" id="profile">
  <div class="header">👤 Company Profile</div>
  <div class="output" id="profileInfo"></div>

  <div style="margin-top:20px;">
    <h3>➕ Add Staff Member</h3>
    <input type="text" id="staffName" placeholder="Staff Name">
    <input type="text" id="staffRole" placeholder="Staff Role (e.g Sales Manager)">
    <button onclick="addStaff()">Add Staff</button>
  </div>

  <div style="margin-top:20px;">
    <h3>👥 Staff Members</h3>
    <div class="output" id="staffList"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('dashboard', this)">🏠<span>Dashboard</span></div>
  <div class="nav-item" onclick="switchPage('history', this)">🕘<span>History</span></div>
  <div class="nav-item" onclick="switchPage('settings', this)">⚙<span>Settings</span></div>
  <div class="nav-item" onclick="switchPage('profile', this)">👤<span>Profile</span></div>
</div>

<script>
// ==================== DATABASE ====================
let db;
let request = indexedDB.open("CarMarketingDB", 1);
request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("cars",{keyPath:"id",autoIncrement:true}); };
request.onsuccess = e => { db = e.target.result; loadHistory(); loadProfile(); loadStaff(); };

// ==================== NAV ====================
function switchPage(pageId, element){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  element.classList.add('active');
}

// ==================== SETTINGS ====================
function saveSettings(){
  let name=document.getElementById("dealerName").value.trim();
  let phone=document.getElementById("dealerPhoneSetting").value.trim();
  let pin=document.getElementById("dealerPin").value.trim();
  if(name) localStorage.setItem("dealerName",name);
  if(phone) localStorage.setItem("dealerPhone",phone);
  if(pin) localStorage.setItem("dealerPin",pin);
  loadProfile();
}

function loadProfile(){
  let name=localStorage.getItem("dealerName")||"Eddie Motors";
  let phone=localStorage.getItem("dealerPhone")||"";
  document.getElementById("profileInfo").innerHTML=`Dealer: ${name}<br>WhatsApp: ${phone}<br>Status: Active`;
}

// ==================== HISTORY ====================
function saveToHistory(postText, files, featured=false){
  let tx=db.transaction(["cars"],"readwrite");
  let store=tx.objectStore("cars");
  store.add({text:postText,images:files,date:new Date().toLocaleString(),featured:featured});
  tx.oncomplete=loadHistory;
}

function loadHistory(){
  let box=document.getElementById("historyList");
  box.innerHTML="";
  let tx=db.transaction(["cars"],"readonly");
  let store=tx.objectStore("cars");
  store.openCursor().onsuccess=function(e){
    let cursor=e.target.result;
    if(cursor){
      let item=cursor.value;
      let imagesHTML="";
      if(item.images) Array.from(item.images).forEach(f=>{
        let url=URL.createObjectURL(f);
        imagesHTML+=`<img src="${url}" style="width:100%;border-radius:8px;margin-top:5px;">`;
      });
      box.innerHTML+=`
      <div style="margin-bottom:15px;padding:12px;background:#1e293b;border-radius:10px;${item.featured?'border:2px solid gold;':''}">
        <small style="color:#9ca3af;">${item.date}</small>
        <div style="margin-top:5px;">${imagesHTML}</div>
        <div style="margin-top:8px;">${item.text}</div>
        <button onclick="deleteCar(${item.id})" style="background:#dc2626;margin-top:8px;padding:6px;border:none;border-radius:6px;color:white;">Delete</button>
        <button onclick="toggleFeatured(${item.id})" style="background:#f59e0b;margin-top:5px;padding:6px;border:none;border-radius:6px;color:white;">${item.featured?'Unfeature':'Feature'}</button>
        <a href="https://wa.me/${localStorage.getItem('dealerPhone')||''}" target="_blank" style="display:block;margin-top:5px;background:#10b981;padding:6px;border-radius:6px;text-align:center;color:white;text-decoration:none;">Chat Dealer</a>
      </div>`;
      cursor.continue();
    }
  };
}

function deleteCar(id){
  let tx=db.transaction(["cars"],"readwrite");
  tx.objectStore("cars").delete(id);
  tx.oncomplete=loadHistory;
}

function toggleFeatured(id){
  let tx=db.transaction(["cars"],"readwrite");
  let store=tx.objectStore("cars");
  store.get(id).onsuccess=function(e){
    let item=e.target.result;
    item.featured=!item.featured;
    store.put(item);
  };
  tx.oncomplete=loadHistory;
}

// ==================== CAPTIONS & POST ====================
const captions=[
  "🔥 Clean and affordable ride!",
  "💎 Premium condition, ready to drive!",
  "🚘 Smooth engine, zero worries!",
  "⚡ Fast deal — serious buyers only!",
  "💰 Best price in the market!"
];

function generatePost(){
  let dealerName=localStorage.getItem("dealerName")||"Eddie Motors";
  let dealerPhone=localStorage.getItem("dealerPhone")||"";
  let name=document.getElementById("carName").value;
  let year=document.getElementById("year").value;
  let price=document.getElementById("price").value;
  let condition=document.getElementById("condition").value;
  let media=document.getElementById("mediaInput").files;
  let result=document.getElementById("result");
  let caption=captions[Math.floor(Math.random()*captions.length)];
  let post=`🚗 ${name} (${year})
💰 Price: ${price}
📌 Condition: ${condition}
🏢 Dealer: ${dealerName}
📲 WhatsApp: https://wa.me/${dealerPhone}
${caption}`;
  result.innerText=post;
  saveToHistory(post, media);
}

// ==================== SHARE ====================
async function sharePost(){
  let text=document.getElementById("result").innerText;
  let files=Array.from(document.getElementById("mediaInput").files);
  try{
    if(navigator.canShare && navigator.canShare({files})){
      await navigator.share({title:"Car Advert",text:text,files:files});
    }else{
      await navigator.clipboard.writeText(text);
    }
  }catch(e){
    await navigator.clipboard.writeText(text);
  }
}

// ==================== STAFF ====================
function getStaff(){return JSON.parse(localStorage.getItem("staffMembers"))||[];}
function saveStaff(list){localStorage.setItem("staffMembers",JSON.stringify(list));}
function addStaff(){
  let name=document.getElementById("staffName").value.trim();
  let role=document.getElementById("staffRole").value.trim();
  if(!name||!role)return;
  let staff=getStaff();
  staff.push({name,role});
  saveStaff(staff);
  document.getElementById("staffName").value="";
  document.getElementById("staffRole").value="";
  loadStaff();
}
function loadStaff(){
  let box=document.getElementById("staffList");
  let staff=getStaff();
  box.innerHTML="";
  if(staff.length===0){box.innerHTML="No staff added yet.";return;}
  staff.forEach((s,i)=>{
    box.innerHTML+=`<div style="margin-bottom:10px;padding:10px;background:#1e293b;border-radius:8px;">
    <strong>${s.name}</strong><br>
    <small>${s.role}</small><br>
    <button onclick="deleteStaff(${i})" style="background:#dc2626;margin-top:6px;padding:5px;border:none;border-radius:6px;color:white;">Delete</button>
    </div>`;
  });
}
function deleteStaff(i){let s=getStaff();s.splice(i,1);saveStaff(s);loadStaff();}
</script>
</body>
    </html>
