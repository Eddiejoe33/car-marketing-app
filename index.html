<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Car Marketing App</title>
<style>
  /* Flex layout for full mobile support */
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    flex-direction: column;
    font-family: Arial;
    background: #f4f4f4;
    color: #333;
  }

  h2,h3 { margin:10px 0; }
  input, textarea { width: 100%; padding:8px; margin:3px 0; border:1px solid #ccc; border-radius:6px; font-size:16px; }
  button { padding:10px; margin:3px 0; border:none; border-radius:8px; background:#4CAF50; color:white; font-size:16px; width:100%; }
  
  /* Screen content fills remaining space above nav */
  .screen {
    flex: 1 1 auto;
    display: none;
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
  }

  .card { background:white; border-radius:8px; padding:10px; margin:10px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  .bottom-nav {
    flex: 0 0 60px;
    display: flex;
    justify-content: space-around;
    background: #fff;
    border-top: 1px solid #ccc;
    z-index: 999;
  }
  .bottom-nav button { width:24%; font-size:16px; }

  #generatedPost { background:#fff; padding:8px; border-radius:8px; margin:5px 0; white-space: pre-line; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
  .media-preview { display:flex; overflow-x:auto; gap:5px; margin:5px 0; flex-wrap: nowrap; }
  .media-preview img, .media-preview video { max-width:120px; max-height:120px; border-radius:6px; object-fit:cover; }
</style>
</head>
<body>

<!-- PIN Screen -->
<div id="pinScreen" class="screen">
  <h2>🔐 Enter 4-Digit PIN</h2>
  <input type="password" id="pinInput" maxlength="4" placeholder="****">
  <button onclick="checkPin()">Enter</button>
  <p id="pinMessage" style="color:red;"></p>
</div>

<!-- Dashboard Screen -->
<div id="dashboardScreen" class="screen">
  <h2>🏠 Create Car Post</h2>
  <input type="text" id="carName" placeholder="Car Name">
  <input type="text" id="carYear" placeholder="Year">
  <input type="text" id="carPrice" placeholder="Price">
  <input type="text" id="carCondition" placeholder="Condition (New / Used)">
  <textarea id="carNotes" placeholder="Notes / Description"></textarea>
  <input type="file" id="carMedia" accept="image/*,video/*" multiple>
  <button onclick="generatePost()">Generate Post</button>

  <div id="generatedPost"></div>
  <div class="media-preview" id="mediaPreview"></div>
  <button onclick="copyPost()">📋 Copy Post</button>
  <button onclick="sharePost()">📤 Share Post</button>
</div>

<!-- History Screen -->
<div id="historyScreen" class="screen">
  <h2>📚 Post History</h2>
  <div id="historyList"></div>
</div>

<!-- Settings Screen -->
<div id="settingsScreen" class="screen">
  <h2>⚙️ Settings</h2>
  <input type="password" id="newPin" maxlength="4" placeholder="Enter New PIN">
  <button onclick="changePin()">Change PIN</button>
</div>

<!-- Profile Screen -->
<div id="profileScreen" class="screen">
  <h2>👤 Profile</h2>
  <p>Name: <span id="dealerName">Dealer</span></p>
  <p>Phone: <span id="dealerPhone">+234xxxxxxxxx</span></p>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button onclick="showScreen('dashboardScreen')">🏠 Dashboard</button>
  <button onclick="showScreen('historyScreen')">📚 History</button>
  <button onclick="showScreen('settingsScreen')">⚙️ Settings</button>
  <button onclick="showScreen('profileScreen')">👤 Profile</button>
</div>

<script>
  // ---------------- PIN Logic ----------------
  if(!localStorage.getItem("dealerPIN")) localStorage.setItem("dealerPIN","1234");
  function checkPin(){
    const pin=document.getElementById("pinInput").value;
    if(pin===localStorage.getItem("dealerPIN")){
      document.getElementById("pinScreen").style.display="none";
      showScreen('dashboardScreen');
      loadHistory();
    } else document.getElementById("pinMessage").innerText="Incorrect PIN!";
  }
  function changePin(){
    const newPin=document.getElementById("newPin").value;
    if(newPin.length===4){ localStorage.setItem("dealerPIN",newPin); alert("PIN changed!"); document.getElementById("newPin").value=""; }
    else alert("PIN must be 4 digits!");
  }

  // ---------------- Screen Navigation ----------------
  function showScreen(screenId){
    ['dashboardScreen','historyScreen','settingsScreen','profileScreen','pinScreen'].forEach(s=>document.getElementById(s).style.display='none');
    document.getElementById(screenId).style.display='block';
  }

  // ---------------- Car / Post Logic ----------------
  let selectedFiles=[];
  document.getElementById("carMedia").addEventListener("change",(e)=>{
    selectedFiles=Array.from(e.target.files);
    const preview=document.getElementById("mediaPreview"); preview.innerHTML="";
    selectedFiles.forEach(file=>{
      const url=URL.createObjectURL(file);
      if(file.type.startsWith("image")){ const img=document.createElement("img"); img.src=url; preview.appendChild(img); }
      else if(file.type.startsWith("video")){ const vid=document.createElement("video"); vid.src=url; vid.controls=true; preview.appendChild(vid); }
    });
  });

  function generatePost(){
    const name=document.getElementById("carName").value;
    const year=document.getElementById("carYear").value;
    const price=document.getElementById("carPrice").value;
    const condition=document.getElementById("carCondition").value;
    const notes=document.getElementById("carNotes").value;
    if(!name || !year || !price){ alert("Please fill Name, Year, Price!"); return; }
    const post=`🚗 *${name}*\n📅 Year: ${year}\n💰 Price: ₦${price}\n🔧 Condition: ${condition}\n✨ Notes: ${notes || '-'}\n📱 Contact me for details!`;
    document.getElementById("generatedPost").innerText=post;

    let history=JSON.parse(localStorage.getItem("postHistory"))||[];
    const mediaData=selectedFiles.map(f=>({name:f.name,type:f.type}));
    history.push({name,year,price,condition,notes,post,media:mediaData});
    localStorage.setItem("postHistory",JSON.stringify(history));
    loadHistory();
  }

  function copyPost(){ navigator.clipboard.writeText(document.getElementById("generatedPost").innerText).then(()=>alert("Post copied!")); }
  function sharePost(){ const text=document.getElementById("generatedPost").innerText; if(navigator.share) navigator.share({text}); else alert("Sharing not supported."); }

  function loadHistory(){
    const list=document.getElementById("historyList"); list.innerHTML="";
    let history=JSON.parse(localStorage.getItem("postHistory"))||[];
    history.forEach(item=>{
      const div=document.createElement("div"); div.className="card";
      div.innerHTML=`🚗 <strong>${item.name}</strong><br>Year: ${item.year} | Price: ₦${item.price} | Condition: ${item.condition}<br>Notes: ${item.notes || '-'}<br><pre>${item.post}</pre>`;
      list.appendChild(div);
    });
  }

  // ---------------- Initial Load ----------------
  document.getElementById("pinScreen").style.display="block";
</script>

</body>
  </html>
