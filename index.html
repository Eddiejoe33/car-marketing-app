<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Car Marketing App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#0f172a;
  color:white;
  overflow:hidden; /* THIS STOPS SCROLL */
}

/* MAIN CONTENT */
.main{
  flex:1;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* HEADER */
.header{
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin-bottom:8px;
}

/* FORM */
.form input,
.form select{
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
  font-size:13px;
}

/* FILE UPLOAD */
.file-box{
  background:#1e293b;
  padding:6px;
  border-radius:6px;
  font-size:12px;
  margin-bottom:6px;
}

/* BUTTONS */
button{
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  font-size:13px;
}

button:active{
  transform:scale(0.97);
}

/* OUTPUT */
.output{
  background:#1e293b;
  padding:6px;
  border-radius:6px;
  font-size:12px;
  min-height:60px;
  overflow:auto;
}

/* BOTTOM NAV */
.bottom-nav{
  height:55px;
  background:#111827;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:12px;
  border-top:1px solid #1f2937;
}

.bottom-nav div{
  text-align:center;
}
</style>
</head>

<body>

<div class="main">

  <div>
    <div class="header">🚗 Create Car Advert</div>

    <div class="form">
      <input type="text" id="carName" placeholder="Car Name">
      <input type="text" id="year" placeholder="Year">
      <input type="text" id="price" placeholder="Price">
      <select id="condition">
        <option>Condition</option>
        <option>Brand New</option>
        <option>Foreign Used</option>
        <option>Nigerian Used</option>
      </select>
    </div>

    <div class="file-box">
      📸 Upload Image / Video
      <input type="file" id="media" style="margin-top:4px;">
    </div>

    <button onclick="generatePost()">✨ Generate Post</button>
    <button onclick="sharePost()">📤 Share Post</button>
  </div>

  <div class="output" id="result">
    Your generated advert will appear here...
  </div>

</div>

<div class="bottom-nav">
  <div>🏠 Dashboard</div>
  <div>🕘 History</div>
  <div>⚙ Settings</div>
  <div>👤 Profile</div>
</div>

<script>
function generatePost(){
  let name = document.getElementById("carName").value;
  let year = document.getElementById("year").value;
  let price = document.getElementById("price").value;
  let condition = document.getElementById("condition").value;

  let post = `🚗 ${name} (${year})
💰 Price: ${price}
📌 Condition: ${condition}

🔥 Clean and affordable ride!
📲 DM now to secure this deal!`;

  document.getElementById("result").innerText = post;
}

function sharePost(){
  let text = document.getElementById("result").innerText;

  if(navigator.share){
    navigator.share({
      title: "Car Advert",
      text: text
    });
  } else {
    alert("Sharing not supported on this device.");
  }
}
</script>

</body>
</html>
