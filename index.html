<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Car Marketing App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html,body{
  height:100%;
  overflow:hidden;
  background:#0f172a;
  color:white;
}

/* APP WRAPPER */
.app{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:flex;
  flex-direction:column;
}

/* CONTENT */
.content{
  flex:1;
  padding:14px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* HEADER */
.header{
  text-align:center;
  font-weight:bold;
  font-size:22px; /* Bigger */
  margin-bottom:12px;
}

/* FORM */
input, select{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:15px; /* Bigger */
}

/* FILE */
.file-box{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  font-size:14px; /* Bigger */
  margin-bottom:8px;
}

/* BUTTONS */
button{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  font-size:15px; /* Bigger */
}

/* OUTPUT */
.output{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  font-size:14px; /* Bigger */
  height:90px;
  overflow:auto;
}

/* BOTTOM NAV */
.bottom-nav{
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:14px; /* Bigger */
  border-top:1px solid #1f2937;
}

.nav-item{
  flex:1;
  text-align:center;
  padding-top:6px;
  color:#9ca3af;
  transition:0.3s;
}

.nav-item.active{
  color:#2563eb;
  font-weight:bold;
  border-top:3px solid #2563eb;
}
</style>
</head>

<body>

<div class="app">

  <div class="content">

    <div>
      <div class="header">🚗 Create Car Advert</div>

      <input type="text" id="carName" placeholder="Car Name">
      <input type="text" id="year" placeholder="Year">
      <input type="text" id="price" placeholder="Price">
      <select id="condition">
        <option>Condition</option>
        <option>Brand New</option>
        <option>Foreign Used</option>
        <option>Nigerian Used</option>
      </select>

      <div class="file-box">
        📸 Upload Image / Video
        <input type="file" id="media" style="margin-top:6px;">
      </div>

      <button onclick="generatePost()">✨ Generate Post</button>
      <button onclick="sharePost()">📤 Share Post</button>
    </div>

    <div class="output" id="result">
      Your generated advert will appear here...
    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="setActive(this)">🏠 Dashboard</div>
    <div class="nav-item" onclick="setActive(this)">🕘 History</div>
    <div class="nav-item" onclick="setActive(this)">⚙ Settings</div>
    <div class="nav-item" onclick="setActive(this)">👤 Profile</div>
  </div>

</div>

<script>
function generatePost(){
  let name = document.getElementById("carName").value;
  let year = document.getElementById("year").value;
  let price = document.getElementById("price").value;
  let condition = document.getElementById("condition").value;

  let post = `🚗 ${name} (${year})
💰 Price: ${price}
📌 Condition: ${condition}

🔥 Clean and affordable ride!
📲 DM now to secure this deal!`;

  document.getElementById("result").innerText = post;
}

function sharePost(){
  let text = document.getElementById("result").innerText;

  if(navigator.share){
    navigator.share({
      title: "Car Advert",
      text: text
    });
  } else {
    alert("Sharing not supported on this device.");
  }
}

/* Active Nav Indicator */
function setActive(element){
  document.querySelectorAll('.nav-item').forEach(item=>{
    item.classList.remove('active');
  });
  element.classList.add('active');
}
</script>

</body>
</html>
