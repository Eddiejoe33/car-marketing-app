<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Car Marketing App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
html,body{height:100%;background:#0f172a;color:white;}

.page{display:none;padding:15px;padding-bottom:100px;min-height:100vh;}
.page.active{display:block;}

.header{text-align:center;font-size:22px;font-weight:bold;margin-bottom:15px;}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

.file-box{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.output{
background:#1e293b;
padding:10px;
border-radius:8px;
white-space:pre-line;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#111827;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #1f2937;
}

.nav-item{
flex:1;
text-align:center;
color:#9ca3af;
padding-top:6px;
}

.nav-item.active{
color:#2563eb;
font-weight:bold;
border-top:3px solid #2563eb;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div class="page active" id="dashboard">

<div class="header">🚗 Elegant Car App</div>

<input type="text" id="carName" placeholder="Car Name">

<input type="text" id="year" placeholder="Year">

<input type="text" id="price" placeholder="Price">

<select id="condition">
<option>Condition</option>
<option>Brand New</option>
<option>Foreign Used</option>
<option>Nigerian Used</option>
</select>

<div class="file-box">
📸 Upload Images
<input type="file" id="mediaInput" accept="image/*">
</div>

<button onclick="generatePost()">✨ Generate Post</button>

<button onclick="sharePost()">📤 Share Post</button>

<div class="output" id="result">
Your generated advert will appear here...
</div>

</div>

<!-- HISTORY -->
<div class="page" id="history">

<div class="header">🕘 History</div>

<div class="output" id="historyBox"></div>

</div>

<!-- SETTINGS -->
<div class="page" id="settings">

<div class="header">⚙ Settings</div>

<input type="text" id="dealerName" placeholder="Dealer Name">

<input type="text" id="dealerPhone" placeholder="WhatsApp Number (234xxxxxxxxxx)">

<button onclick="saveSettings()">Save Settings</button>

</div>

<!-- PROFILE -->
<div class="page" id="profile">

<div class="header">👤 Company Profile</div>

<div class="output" id="profileInfo"></div>

<h3 style="margin-top:20px">Add Staff</h3>

<input type="text" id="staffName" placeholder="Staff Name">

<input type="text" id="staffRole" placeholder="Staff Role">

<button onclick="addStaff()">Add Staff</button>

<div class="output" id="staffList" style="margin-top:10px"></div>

</div>

<!-- NAVIGATION -->

<div class="bottom-nav">

<div class="nav-item active" onclick="switchPage('dashboard',this)">🏠</div>

<div class="nav-item" onclick="switchPage('history',this)">🕘</div>

<div class="nav-item" onclick="switchPage('settings',this)">⚙</div>

<div class="nav-item" onclick="switchPage('profile',this)">👤</div>

</div>

<script>

function switchPage(page,el){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"))

el.classList.add("active")

}

function saveSettings(){

let name=document.getElementById("dealerName").value

let phone=document.getElementById("dealerPhone").value

if(name)localStorage.setItem("dealerName",name)

if(phone)localStorage.setItem("dealerPhone",phone)

loadProfile()

}

function loadProfile(){

let name=localStorage.getItem("dealerName")||"My Car Business"

let phone=localStorage.getItem("dealerPhone")||""

document.getElementById("profileInfo").innerHTML=

"Dealer: "+name+"<br><br>WhatsApp: "+phone

}

loadProfile()

const captions=[

"🔥 Clean car, ready to drive",

"💎 Premium condition",

"🚗 Smooth engine guaranteed",

"💰 Best deal available",

"⚡ Serious buyers only"

]

function generatePost(){

let car=document.getElementById("carName").value

let year=document.getElementById("year").value

let price=document.getElementById("price").value

let condition=document.getElementById("condition").value

let dealer=localStorage.getItem("dealerName")||"Dealer"

let phone=localStorage.getItem("dealerPhone")||""

let caption=captions[Math.floor(Math.random()*captions.length)]

let whatsapp=phone?"https://wa.me/"+phone:""

let post=`🚗 ${car} (${year})

💰 Price: ${price}

📌 Condition: ${condition}

🏢 Dealer: ${dealer}

${caption}

📲 WhatsApp:
${whatsapp}`

document.getElementById("result").innerText=post

saveHistory(post)

}

function sharePost(){

let text=document.getElementById("result").innerText

if(navigator.share){

navigator.share({text:text})

}else{

navigator.clipboard.writeText(text)

}

}

function saveHistory(text){

let history=JSON.parse(localStorage.getItem("history")||"[]")

history.unshift(text)

localStorage.setItem("history",JSON.stringify(history))

loadHistory()

}

function loadHistory(){

let history=JSON.parse(localStorage.getItem("history")||"[]")

let box=document.getElementById("historyBox")

box.innerHTML=""

history.forEach(item=>{

box.innerHTML+=`<div style="margin-bottom:10px">${item}</div>`

})

}

loadHistory()

function getStaff(){

return JSON.parse(localStorage.getItem("staff")||"[]")

}

function saveStaff(list){

localStorage.setItem("staff",JSON.stringify(list))

}

function addStaff(){

let name=document.getElementById("staffName").value

let role=document.getElementById("staffRole").value

if(!name||!role)return

let staff=getStaff()

staff.push({name,role})

saveStaff(staff)

document.getElementById("staffName").value=""

document.getElementById("staffRole").value=""

loadStaff()

}

function loadStaff(){

let staff=getStaff()

let box=document.getElementById("staffList")

box.innerHTML=""

staff.forEach((s,i)=>{

box.innerHTML+=`

<div style="margin-bottom:10px">

<b>${s.name}</b><br>

${s.role}

<button onclick="deleteStaff(${i})">Delete</button>

</div>

`

})

}

function deleteStaff(i){

let staff=getStaff()

staff.splice(i,1)

saveStaff(staff)

loadStaff()

}

loadStaff()

</script>

</body>
  </html>
