<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Car Marketing App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html,body{
  height:100%;
  overflow:hidden;
  background:#0f172a;
  color:white;
}

.app{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:flex;
  flex-direction:column;
}

.page{
  flex:1;
  display:none;
  padding:14px;
  flex-direction:column;
  justify-content:space-between;
}

.page.active-page{
  display:flex;
}

.header{
  text-align:center;
  font-weight:bold;
  font-size:22px;
  margin-bottom:12px;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:15px;
}

.file-box{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  font-size:14px;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  font-size:15px;
}

.output{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  font-size:14px;
  height:90px;
  overflow:auto;
}

.bottom-nav{
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:14px;
  border-top:1px solid #1f2937;
}

.nav-item{
  flex:1;
  text-align:center;
  padding-top:6px;
  color:#9ca3af;
  transition:0.3s;
}

.nav-item.active{
  color:#2563eb;
  font-weight:bold;
  border-top:3px solid #2563eb;
}
</style>
</head>

<body>

<div class="app">

  <!-- DASHBOARD PAGE -->
  <div class="page active-page" id="dashboardPage">
    <div>
      <div class="header">🚗 Create Car Advert</div>

      <input type="text" id="carName" placeholder="Car Name">
      <input type="text" id="year" placeholder="Year">
      <input type="text" id="price" placeholder="Price">
      <select id="condition">
        <option>Condition</option>
        <option>Brand New</option>
        <option>Foreign Used</option>
        <option>Nigerian Used</option>
      </select>

      <div class="file-box">
        📸 Upload Image / Video
        <input type="file">
      </div>

      <button onclick="generatePost()">✨ Generate Post</button>
      <button onclick="sharePost()">📤 Share Post</button>
    </div>

    <div class="output" id="result">
      Your generated advert will appear here...
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="historyPage">
    <div class="header">🕘 Post History</div>
    <div class="output" style="height:70%;">
      No posts yet...
    </div>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page" id="settingsPage">
    <div class="header">⚙ Settings</div>
    <input type="text" placeholder="Change Dealer Name">
    <input type="password" placeholder="Change PIN">
    <button>Save Settings</button>
  </div>

  <!-- PROFILE PAGE -->
  <div class="page" id="profilePage">
    <div class="header">👤 Profile</div>
    <div class="output" style="height:70%;">
      <strong>Dealer Name:</strong> Eddie Motors<br><br>
      <strong>Phone:</strong> +234xxxxxxxxxx<br><br>
      <strong>Status:</strong> Active Dealer
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('dashboardPage', this)">🏠 Dashboard</div>
    <div class="nav-item" onclick="switchPage('historyPage', this)">🕘 History</div>
    <div class="nav-item" onclick="switchPage('settingsPage', this)">⚙ Settings</div>
    <div class="nav-item" onclick="switchPage('profilePage', this)">👤 Profile</div>
  </div>

</div>

<script>

function switchPage(pageId, element){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active-page');
  });

  document.getElementById(pageId).classList.add('active-page');

  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.remove('active');
  });

  element.classList.add('active');
}

function generatePost(){
  let name = document.getElementById("carName").value;
  let year = document.getElementById("year").value;
  let price = document.getElementById("price").value;
  let condition = document.getElementById("condition").value;

  let post = `🚗 ${name} (${year})
💰 Price: ${price}
📌 Condition: ${condition}

🔥 Clean and affordable ride!
📲 DM now to secure this deal!`;

  document.getElementById("result").innerText = post;
}
async function sharePost() {
  const text = document.getElementById("result").innerText;
  const fileInput = document.querySelector("input[type='file']");
  const files = fileInput.files;

  if (navigator.canShare && navigator.canShare({ files })) {
    try {
      await navigator.share({
        title: "Car Advert",
        text: text,
        files: files
      });
    } catch (error) {
      alert("Sharing failed.");
    }
  } else {
    alert("Your browser does not support image sharing.");
  }
  }

</script>

</body>
  </html>
